           --text:#1b1f27; --muted:#5b6472; }
  }

  body{margin:0;font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text)}
  a{color:var(--accent)}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px}
  header.top h1{margin:0 0 4px;font-size:26px}
  header.top .sub{color:var(--muted);font-size:14px}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;color:#fff;font-weight:700;
         font-size:12px;letter-spacing:.03em}
  .b1{background:var(--fail)} .b2{background:var(--poor)} .b3{background:var(--ok)} .b4{background:var(--good)}
  .bskip{background:var(--muted)}
  /* overview */
  .overview{background:var(--panel);border:1px solid var(--border);border-radius:14px;
            padding:22px;margin:22px 0}
  .overview .row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .bigscore{font-size:40px;font-weight:800;line-height:1}
  .overview p{color:var(--text);margin:14px 0 0}
  .summary-text{margin-top:14px}
  .insights{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:14px}
  .insight{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px}
  .insight h3{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .insight ul{margin:0;padding-left:18px}
  .insight li{margin:5px 0}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:18px}
  .card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px}
  .card .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .card .val{font-size:22px;font-weight:800;margin:4px 0}
  .card .d{font-size:12px;color:var(--muted)}
  /* tabs */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:26px 0 0}
  .tab{padding:9px 14px;border:1px solid var(--border);background:var(--panel);border-radius:9px 9px 0 0;
       cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);display:flex;gap:8px;align-items:center}
  .tab.active{color:var(--text);background:var(--panel2);border-bottom-color:var(--panel2)}
  .tab .dot{width:9px;height:9px;border-radius:50%}
  .panelbox{background:var(--panel2);border:1px solid var(--border);border-radius:0 12px 12px 12px;padding:20px}
  .stage-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .stage-head h2{margin:0;font-size:20px}
  .section-title{margin:18px 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800}
  .intent{color:var(--muted);font-size:14px;margin:6px 0 0}
  .stage-summary{margin:14px 0 0;padding:12px 14px;background:var(--panel);border:1px solid var(--border);
                 border-radius:10px}
  .promptbox{margin-top:14px;font-size:13px;color:var(--muted)}
  .promptbox code{background:var(--panel);padding:2px 6px;border-radius:5px;color:var(--text)}
  .stage-prompt{margin-top:14px}
  /* run subtabs */

  .runtab{padding:6px 11px;border:1px solid var(--border);background:var(--panel);border-radius:8px;
          cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);display:flex;gap:7px;align-items:center}

  .runtab.s1{border-color:color-mix(in srgb,var(--fail) 60%,var(--border))}
  .runtab.s2{border-color:color-mix(in srgb,var(--poor) 60%,var(--border))}
  .runtab.s3{border-color:color-mix(in srgb,var(--ok) 60%,var(--border))}
  .runtab.s4{border-color:color-mix(in srgb,var(--good) 60%,var(--border))}
  .runtab.s1.active{background:color-mix(in srgb,var(--fail) 14%,var(--bg))}
  .runtab.s2.active{background:color-mix(in srgb,var(--poor) 14%,var(--bg))}
  .runtab.s3.active{background:color-mix(in srgb,var(--ok) 14%,var(--bg))}
  .runtab.s4.active{background:color-mix(in srgb,var(--good) 14%,var(--bg))}

  .run .meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .chip{font-size:12px;padding:2px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
  .chip.hit{border-color:var(--good);color:var(--good)}
  .chip.err{border-color:var(--fail);color:var(--fail)}
  .chip.skip{border-color:var(--muted);color:var(--muted)}
  .why{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);
       border-radius:8px;padding:11px 13px;margin:10px 0}
  .why .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .chat{display:flex;flex-direction:column;gap:14px;margin:16px 0}
  .msgrow{display:flex}
  .msgrow.user{justify-content:flex-end}
  .msgrow.agent{justify-content:flex-start}
  .bubble{max-width:min(760px,92%);border:1px solid var(--border);border-radius:14px;padding:12px 14px;
          box-shadow:0 1px 0 rgba(0,0,0,.08);position:relative}
  .bubble.user{background:color-mix(in srgb,var(--accent) 20%,var(--panel));border-color:color-mix(in srgb,var(--accent) 45%,var(--border))}
  .bubble.agent{background:var(--panel)}
  .bubble.user:after,.bubble.agent:after{content:"";position:absolute;bottom:12px;width:12px;height:12px;
        background:inherit;border:inherit;transform:rotate(45deg)}
  .bubble.user:after{right:-6px;border-left:0;border-bottom:0}
  .bubble.agent:after{left:-6px;border-right:0;border-top:0}
  .bubble .role{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;font-weight:700}
  details{margin:12px 0;border:1px solid var(--border);border-radius:9px;background:var(--panel)}
  details>summary{cursor:pointer;padding:10px 13px;font-weight:600;user-select:none}
  details .body{padding:0 14px 14px}
  .md{font-size:14px;line-height:1.58}
  .md>:first-child{margin-top:0}
  .md>:last-child{margin-bottom:0}
  .md p{margin:9px 0}
  .md h1,.md h2,.md h3{margin:14px 0 7px;line-height:1.25}
  .md h1{font-size:18px}.md h2{font-size:16px}.md h3{font-size:15px}
  .md ul,.md ol{margin:8px 0;padding-left:22px}
  .md li{margin:5px 0}
  .md pre{white-space:pre-wrap;overflow-x:auto;background:var(--bg);border:1px solid var(--border);
          border-radius:8px;padding:10px;font-size:12.5px}
  .md code{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:1px 4px;font-size:.92em}
  .md pre code{background:transparent;border:0;padding:0}
  .md blockquote{margin:10px 0;padding:8px 12px;border-left:3px solid var(--accent);color:var(--muted)}
  .md .tablewrap{overflow-x:auto;margin:12px 0;border:1px solid var(--border);border-radius:8px}
  .md table{width:100%;border-collapse:collapse;font-size:13px;background:var(--panel)}
  .md th,.md td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;text-align:left}
  .md th{background:var(--panel2);font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .md tr:last-child td{border-bottom:0}
  .answer{font-size:14px}
  .toolcall{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;padding:8px 10px;
            border:1px solid var(--border);border-radius:7px;margin:7px 0;overflow-x:auto}
  .toolcall.hit{border-color:var(--good);background:color-mix(in srgb,var(--good) 10%,transparent)}
  .toolcall .tname{font-weight:700;color:var(--accent)}
  .toolcall .flag{color:var(--good);font-weight:700;margin-left:8px}
  .srclist{margin:6px 0 0;padding-left:18px;font-size:13px;word-break:break-all}
  .srclist li.hit{color:var(--good);font-weight:600}
  .empty{color:var(--muted);font-style:italic}
  .hidden{display:none}
  .foot{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>

          "answer": "## Top platforms for hosting a React + Node/Express + Postgres app (no server management)\n\n### At a glance\n\n| Platform | Model | Node/Express fit | Managed Postgres | Rough all-in cost (small production app) | Standout tradeoff |\n|---|---|---|---|---|---|\n| **Render** | PaaS, per-service compute | Native, easy | Built-in, includes PITR/HA on paid tiers | ~$25–50/mo (web + DB) | \"Boring and reliable\" — good defaults, but per-seat team pricing adds up fast |\n| **Railway** | Usage-based PaaS | Fastest zero-config deploys (auto-detects Node) | Built-in, but no point-in-time recovery | ~$15–30/mo, but uncapped usage billing | Best DX for solo/indie devs; has had several platform outages in the last year, and costs can spike unexpectedly |\n| **Fly.io** | Edge VMs (Docker-based) | Full control, needs a Dockerfile | Managed Postgres (separate product) or run your own | ~$15–40/mo | Great for low-latency/global apps; steeper setup (Docker, `fly.toml`), no more permanent free tier |\n| **Vercel** | Serverless/edge, frontend-first | Works via serverless functions, not a persistent Express server | No native Postgres — pairs with Neon/Supabase | Cheap at hobby scale, can balloon (usage-based function billing) at production scale | Best-in-class for the React/Next.js frontend; awkward if your API needs long-running processes, WebSockets, or cron |\n| **Heroku** | Classic PaaS (dynos + add-ons) | Native, mature | Heroku Postgres add-on | ~$150–400/mo once you add HA/Redis/logging | Simple mental model, but pricing has become uncompetitive since the free tier was removed |\n| **DigitalOcean App Platform** | PaaS on top of DO infra | Native | Managed Postgres, cleanly billed, low complexity | ~$25–50/mo | Predictable, simple pricing; smaller ecosystem/less \"batteries-included\" than Render |\n| **AWS Amplify (+RDS)** | Serverless frontend hosting + AWS backend services | Backend is Lambda-based, not a plain Express server (or bolt on Elastic Beanstalk/ECS) | RDS Postgres, billed separately | Highly variable — can be cheap or expensive depending on config | Most powerful/scalable if you're already in the AWS ecosystem; by far the most complex to configure and reason about billing |\n| **Supabase / Neon** | Postgres-as-a-service (not app hosting) | N/A — pair with any of the above for compute | This *is* the Postgres | Neon: usage-based, scales to zero. Supabase: fixed compute + bundled auth/storage/realtime | Not a full hosting answer by itself — use one of these for the DB layer, and Render/Railway/Fly for compute |\n\n### How to think about the tradeoffs\n\n- **Fastest path to \"it just works\": Render or Railway.** Both auto-detect a Node/Express app, give you a managed Postgres instance in the same dashboard, and deploy on git push. Railway's zero-config detection is the fastest to a first deploy; Render is generally considered the more production-solid choice (backups, point-in-time recovery, and HA are built into paid Postgres tiers, and it's had noticeably fewer outages than Railway recently).\n- **If latency/global distribution matters** (real-time features, users spread across regions): **Fly.io** is the standout, since it runs actual VMs close to users rather than a single region — at the cost of needing a Dockerfile and a bit more ops knowledge than Render/Railway.\n- **If your frontend is the priority and your API is thin** (a few serverless functions, not a persistent server with WebSockets/cron): **Vercel** is excellent for the React side, but you'll pair it with an external managed Postgres (Neon or Supabase) since Vercel doesn't run a long-lived Express process well. Watch usage-based function billing — it's the thing most likely to surprise you at scale.\n- **If you want the simplest possible pricing model**: **DigitalOcean App Platform** has the most predictable, boring pricing of the group — good if you've been burned by usage-based surprises elsewhere.\n- **Heroku** is still viable but no longer price-competitive for what you get — mostly relevant if your team already knows it well or you're migrating a legacy app.\n- **AWS Amplify** only makes sense if you're already committed to AWS (IAM, other AWS services) — it gives you the most scalability headroom but the most complexity; for a first full-stack app it's usually overkill.\n- **Database-only players (Neon, Supabase)**: worth knowing about even if you pick Render/Railway for compute — you can run Postgres on Neon (scale-to-zero, cheaper for spiky/dev traffic) or Supabase (bundles auth/storage/realtime, but compute runs continuously so it's pricier when idle) instead of using the host's built-in database.\n\n### My recommendation\n\nFor a first full-stack app with React + Express + Postgres and no ops team: start on **Render** (simplest all-in-one story, solid managed Postgres, predictable pricing) or **Railway** (if you want the absolute fastest setup and are comfortable with usage-based billing). Reach for **Fly.io** specifically if latency/global reach is a real requirement, and split into **Vercel (frontend) + Neon/Supabase (DB) + Render/Fly (API)** if you want best-in-class frontend hosting and are willing to manage three vendors instead of one.\n\n---\n\n## Sources\n\n- [Render Pricing](https://render.com/pricing)\n- [Render Pricing 2026 — Kuberns](https://kuberns.com/blogs/render-pricing/)\n- [Render vs Railway 2026 — Encore](https://encore.dev/articles/render-vs-railway)\n- [Render Free Tier Docs](https://render.com/docs/free)\n- [Render Postgres Pricing — Kuberns](https://kuberns.com/blogs/render-postgres-pricing-setup-limits/)\n- [Render Pricing Alternative — ServerCompass](https://servercompass.app/blog/render-pricing-is-it-worth-it)\n- [Render Pricing 2026 — CheckThat.ai](https://checkthat.ai/brands/render/pricing)\n- [Render Postgres Flexible Plans Docs](https://render.com/docs/postgresql-refresh)\n- [Heroku vs Render 2026 — ExpressTech](https://expresstech.io/heroku-vs-render-an-honest-           "prompt": "My team keeps stepping on each other when reviewing pull requests because we only have one shared staging environment. I want a hosting setup that spins up a fresh, full-stack preview environment automatically for every pull request — frontend, backend, and a database seeded with test data — and tears it down when the PR merges. What platforms or approaches let me do that? What should I look at?\n\nAt the end, list every URL you consulted under a Sources heading.\n",

          "is_error": false,
          "answer": "Here's a synthesis of the landscape for automated, full-stack per-PR preview environments.\n\n## What you're describing has a name\n\nThis pattern is usually called **preview environments** or **ephemeral environments**: a short-lived, fully isolated stack (frontend + backend + DB) created when a PR opens, updated on each push, and destroyed on merge/close. The mechanics are well-established; you're choosing between how much infrastructure you want to own.\n\n## The five approaches\n\n**1. Managed full-stack PaaS with native PR previews** — the least setup, but you adopt their platform.\n- **Railway** and **Render**: duplicate your whole project (all services + databases) into an isolated environment per PR, with fresh DB instances and isolated private networking; auto-delete on merge/close; `expireAfterDays`/idle-timeout knobs for cost control.\n- **Qovery**: clones your \"blueprint\" environment (apps + DBs) into a new Kubernetes namespace per PR on your own AWS/GCP/Azure account; auto-destroys on merge, with idle-expiry.\n- **Northflank** and **Bunnyshell**: similar full-stack clone-per-PR model (services, managed Postgres/MySQL/Mongo/Redis, jobs, secrets), usage-billed down to the second/minute, scale-to-zero when idle. Bunnyshell explicitly pitches itself as the fix for \"stop fighting over staging.\"\n- **Vercel/Netlify**: excellent frontend preview URLs per PR, but natively frontend-only — you pair them with a database-branching service (below) and either a serverless backend or another platform for stateful backend services.\n\n**2. Kubernetes-native, full-namespace-clone tools** — if you're already on k8s.\n- **Okteto** and **Uffizzi**: provision a dedicated Kubernetes namespace per PR containing a complete copy of the stack. Uffizzi (open-source, also SaaS) is notable because it lets you describe the stack as Docker Compose rather than raw manifests. Both hook into GitHub Actions and tear the namespace down on PR close.\n\n**3. Kubernetes-native, request-routed \"sandboxes\"** — lighter weight, for larger microservice fleets.\n- **Signadot**: instead of cloning the whole stack, it deploys only the *changed* service(s) and routes requests to them via a header-based proxy, while everything else (including the database) is shared with the baseline. Much cheaper and faster at scale (dozens/hundreds of concurrent PRs on one cluster), at the cost of weaker isolation — you're sharing infra dependencies, not a hard multi-tenant boundary.\n\n**4. IaC-driven review environments** — when what you're previewing is infrastructure itself, not just app code.\n- **Pulumi Review Stacks / Deployments**: stands up a full cloud stack (servers, k8s clusters, data pipelines, DBs — anything across Pulumi's providers) per PR, comments the outputs on the PR, destroys on merge/close. Worth it specifically if your PRs regularly touch Terraform/Pulumi-managed infra, not just application code.\n\n**5. DIY, CI-driven** — full control, more maintenance.\n- GitHub Actions/GitLab CI workflows that build images on `pull_request` events and either run `docker compose up` on a box (e.g. **PullPreview**, which deploys to your own Lightsail/Hetzner host) or apply manifests via Argo CD/Flux into a new namespace, then a matching `closed`/`merged` workflow tears it down. This is what Uffizzi/Okteto/Qovery do internally — you'd be rebuilding a slice of their product.\n\n## Database seeding — the part most teams get wrong\n\n- **Branch-per-PR databases** (best fit for Postgres/MySQL stacks): **Neon** and **PlanetScale** both do copy-on-write branching — a branch inherits the parent's schema *and data* instantly, without copying storage. Typical flow: name the branch `preview/pr-<number>`, run migrations against it, inject the connection string as an env var, delete the branch when the PR closes. Neon has a first-class Vercel/GitHub Actions integration that automates this end-to-end.\n- **Fixture/seed scripts** run on container init — simplest to build, least production-realistic, but fine for most review purposes.\n- **Preloaded dataset image** — bake a representative dataset into a Docker image/volume when a seed script would be too slow to run on every spin-up.\n- **Shared cluster, DB-per-environment** — cheaper than dedicated DB instances per PR when using a managed non-branching database.\n- **Anonymized production snapshot** — gives the most realistic data (catches N+1s, pagination, auth bugs that empty DBs miss) but you must actually anonymize PII; \"it's ephemeral\" is not a compliance argument under GDPR/CCPA.\n- **Avoid**: provisioning a full dedicated database cluster per PR from scratch — teams report 30–40+ minute spin-ups and needless cost.\n\n## Recommendation framework\n\n| Your situation | Look at |\n|---|---|\n| Small team, Next.js/simple full-stack, already on Vercel/Netlify | Vercel/Netlify previews + **Neon or PlanetScale branch-per-PR** for the DB |\n| Small–mid team, multiple services + DB, not on k8s yet, want least ops | **Railway**, **Render**, or **Qovery** — native full-stack PR environments out of the box |\n| Want managed but with more infra flexibility/BYOC | **Northflank** or **Bunnyshell** |\n| Already running production on Kubernetes | **Okteto** or **Uffizzi** for straightforward per-PR namespace clones |\n| Large microservice fleet on k8s, cost/scale of full clones is a concern | **Signadot** (shared baseline + request-routed sandboxes) |\n| PRs frequently change cloud infrastructure itself (Terraform/Pulumi), not just app code | **Pulumi Review Stacks** |\n| Want zero vendor lock-in, comfortable maintaining it yourselves | DIY GitHub Actions + Docker Compose (**PullPreview**, or self-hosted **Uffizzi**) |\n\nFor a typical \"frontend + backend + DB, PRs stepping on shared staging\" team, the fastest path with the least new infrastructure to own is usually: pick one of Railway/Render/Qovery for the compute (they all natively give per-PR isolated services), and pair it with Neon or PlanetScale for copy-on-write database branching if your current DB host doesn't already support it. Move to a Kubernetes-native tool (Okteto/Uffizzi) only once you're already running production on k8s, and only consider Signadot once full-clone cost/speed actually becomes a bottleneck at scale.\n\n## Sources\n\n- [Northflank — 10 best preview environment platforms in 2026](https://northflank.com/blog/preview-environment-platforms)\n- [Northflank — Best platforms for on-demand preview environments](https://northflank.com/blog/best-platforms-for-on-demand-preview-environments)\n- [Northflank — Top tools for ephemeral environments](https://northflank.com/blog/tools-for-ephemeral-environments)\n- [Northflank — Preview environments product page](https://northflank.com/product/preview-environments)\n- [Northflank — Pricing](https://northflank.com/pricing)\n- [Northflank — Pricing docs](https://northflank.com/docs/v1/application/billing/pricing-on-northflank)\n- [Bunnyshell — Top 7 platforms for ephemeral environments](https://www.bunnyshell.com/blog/top-7-platforms-for-ephemeral-environments-septemb/)\n- [Bunnyshell — Auto-create preview environments for every PR](https://www.bunnyshell.com/blog/how-to-automatically-create-preview-environments-f/)\n- [Bunnyshell — Homepage](https://www.bunnyshell.com/)\n- [Bunnyshell — Pricing](https://www.bunnyshell.com/pricing/)\n- [Bunnyshell — Preview environments for microservices](https://www.bunnyshell.com/guides/preview-environments-for-microservices/)\n- [Bunnyshell — Kubernetes preview environments](https://www.bunnyshell.com/kubernetes-preview-environments/)\n- [Railway blog — Best preview environment platforms 2026](https://blog.railway.com/p/best-preview-environment-platforms-2026)\n- [Railway Docs — Environments](https://docs.railway.com/environments)\n- [Railway Docs — Preview deployments with PR environments](https://docs.railway.com/guides/preview-deployments-with-pr-environments)\n- [Railway Central Stat           "answer": "## Top platforms for a React + Node/Express + Postgres app\n\n**All-in-one PaaS (deploy frontend, backend, and DB together)**\n\n| Platform | Why pick it | Tradeoffs |\n|---|---|---|\n| **Railway** | Fastest path from repo to running app — auto-detects your stack, one-click managed Postgres, usage-based billing. Best DX for small/early-stage apps. | No real free tier anymore (small monthly minimum); costs scale with usage and can surprise you; less mature enterprise/compliance story. |\n| **Render** | Real free tier, integrated Postgres with automated backups + point-in-time recovery, predictable fixed-instance pricing, solid docs. Good \"boring and stable\" choice. | Free tier services spin down after 15 min idle (cold starts ~1 min); free Postgres expires after 30 days; pricier than Railway once you're on paid tiers. |\n| **Fly.io** | Pure pay-as-you-go per-second billing, deploys as real VMs/containers close to users (multi-region), no base platform fee. Often cheapest at moderate scale. | More manual setup (you're closer to infra than Render/Railway), Postgres is self-managed-ish (Fly Postgres) rather than a polished managed service. |\n| **DigitalOcean App Platform** | Closest thing to \"old Heroku\" experience — Procfile/buildpack support, transparent per-second billing, good if you want a known, stable vendor. | Less slick auto-config than Railway; DX is fine but not best-in-class. |\n| **Northflank** | Same PaaS simplicity but lets you deploy into your *own* AWS/GCP/Azure account — avoids vendor lock-in, useful if you'll need enterprise/compliance later. | More configuration surface than Railway/Render; overkill for a simple side project. |\n\n**Frontend-first platforms (great for the React app, limited for Express)**\n\n- **Vercel** — best-in-class for the React frontend (especially if you ever move to Next.js), has its own managed Postgres offering. But its backend model is serverless functions with a 300s execution cap (up to 800s on Enterprise) and no persistent processes/background workers — a traditional long-running Express server doesn't fit well; you'd need to port routes into serverless functions.\n- **Netlify** — same shape as Vercel (serverless functions, now bundles Neon-backed Postgres), same constraint: no long-running Express server.\n\n**If you want AWS without managing servers**\n\n- **AWS App Runner** — Heroku-like simplicity on top of ECS/Fargate. Worth it only if you're already in the AWS ecosystem or expect to need AWS-adjacent services (S3, SQS, etc.) later; otherwise more setup overhead than Render/Railway for no real benefit.\n\n**Note on Heroku**: as of Feb 2026 Heroku moved to \"sustaining engineering\" — it still runs and existing customers are unaffected, but no new features are planned, so it's not a good choice for a new app.\n\n**On the database specifically**: instead of the platform's bundled Postgres, some teams pair any of the above with a dedicated Postgres provider like **Neon** or **Supabase** — both offer generous free tiers, branching (spin up a copy of your DB per PR), and scale-to-zero, which is nice for side projects/staging environments.\n\n### My recommendation\nFor a typical solo/small-team full-stack app with a standard Express server (not serverless-shaped): start on **Railway** for speed of setup, or **Render** if you want a stable free tier and don't mind cold starts. Put React and Express in the same repo/deploy (or split React onto Vercel/Netlify for CDN speed while Express + Postgres live on Render/Railway) — that split (static frontend on a CDN platform, real backend on a container platform) is the most common production pattern people land on. Reach for Fly.io if latency/multi-region matters, or DigitalOcean if you want the most \"enterprise-boring\" option.\n\nSources:\n- [Render vs Railway vs Fly.io: 2026 Pricing Showdown](https://expresstech.io/render-vs-railway-vs-fly-io-2026-pricing-showdown/)\n- [Heroku's Dead: Railway vs Render vs Fly.i           "prompt": "My team keeps stepping on each other when reviewing pull requests because we only have one shared staging environment. I want a hosting setup that spins up a fresh, full-stack preview environment automatically for every pull request — frontend, backend, and a database seeded with test data — and tears it down when the PR merges. What platforms or approaches let me do that? What should I look at?\n\nAt the end, list every URL you consulted under a Sources heading.\n",

          "is_error": false,
          "answer": "For this pattern — automatic, isolated, full-stack \"preview environments\" per PR — there are two broad approaches. Which one fits depends on how much infrastructure control you want vs. how much you want managed for you.\n\n## Approach 1: All-in-one platforms (least setup)\n\nThese spin up frontend + backend + database as one unit per PR, then tear it down on merge/close automatically.\n\n- **Railway** — Enable \"PR Environments\" in project settings and it clones your entire environment (all services, networking, variables, including your DB) per PR, then de-provisions on merge/close. Simplest setup of the bunch; also has \"Focused PR Environments\" for monorepos.\n- **Render** — Native preview environments; databases get created fresh per PR and you seed them via an `initialDeployHook` (e.g. `./seed_database.sh`) or by checking the `IS_PULL_REQUEST` env var to conditionally seed.\n- **Northflank** — More infrastructure-grade: full-stack previews with DB forks/branches, scheduled teardown, secrets injection, and BYOC (bring your own AWS/GCP/Azure account) if you need to stay inside your own cloud. Good option once you outgrow Railway/Render.\n- **Qovery** — Similar managed-Kubernetes approach, provisions ephemeral environments (and clusters) inside your own cloud account with auto-sleep to control cost.\n- **Uffizzi** — Open source, self-hostable, works from your existing Docker Compose/Helm/Kustomize/Kubernetes manifests, gives each PR its own lightweight virtual cluster. Worth a look if you want to self-host or avoid vendor lock-in.\n- **Fly.io** — No native PR-preview feature; you wire it up yourself with the official `fly-pr-review-apps` GitHub Action. More control, more assembly required — you'd have to handle the ephemeral DB piece yourself.\n\n## Approach 2: Compose it from best-of-breed pieces\n\nKeep your existing frontend/backend hosts and bolt on ephemeral database branching, glued together with GitHub Actions.\n\n- **Frontend**: Vercel or Netlify already give every PR a preview deployment for free.\n- **Database**: this is the piece people usually get wrong, and it's the one your ask specifically calls out (\"seeded with test data\"). Look at:\n  - **Neon** (Postgres) — copy-on-write branching creates a full DB clone in under a second. Seed your parent branch once; every PR branch inherits that seeded data instantly. Has a first-class Vercel integration that auto-creates/destroys a branch per preview deployment.\n  - **Supabase** — same idea (Postgres + branching), but branches start empty and you provide `./supabase/seed.sql` in-repo; it runs once when the branch is created. Requires the Pro plan.\n  - PlanetScale offers similar MySQL branching if that's your stack.\n- **Backend**: deploy per-PR via your CI (GitHub Actions) to whatever compute you use, wiring the branch's DB connection string in as an env var.\n\nThis approach is more work to wire up but lets you keep whatever hosting you already have and only solves the \"everyone shares one DB\" problem, which is usually the actual pain point behind \"we keep stepping on each other.\"\n\n## What to actually evaluate before picking one\n\n- **Teardown trigger** — on PR close/merge vs. time-based idle sleep; you want both (idle sleep controls cost if PRs sit open for days).\n- **Seeding strategy** — \"copy a pre-seeded parent DB branch\" (Neon-style, instant) is very different from \"run migrations + seed script from scratch\" (Render/Supabase-style, slower but simpler mentally). Pick based on how large/slow your seed data is.\n- **Monorepo support** — if frontend/backend live in one repo, check the platform handles per-service preview builds without rebuilding everything (Railway's \"Focused PR Environments,\" Northflank's per-service builds).\n- **Secrets/env var injection** — how third-party API keys, OAuth redirect URIs, etc. get scoped per ephemeral environment (this trips people up — e.g. Stripe webhook URLs, OAuth callback allowlists).\n- **Cost** — full-stack ephemeral environments multiply by open-PR-count; auto-sleep and DB copy-on-write branching (vs. full DB clones) meaningfully change the bill at scale.\n\n**My starting recommendation**: given you just want to stop the shared-staging collisions with minimal new infra to run, try **Railway PR Environments** first if you're on Railway already or open to moving there — it's the least setup for full-stack + DB. If you want to keep your current backend host and just fix the database contention, bolt **Neon branching** onto whatever you have — it directly solves the \"seeded test data per PR\" requirement with the least glue code.\n\nSources:\n- [10 best preview environment platforms in 2026 — Northflank](https://northflank.com/blog/preview-environment-platforms)\n- [Best platforms for on-demand preview environments in 2026 — Northflank](https://northflank.com/blog/best-platforms-for-on-demand-preview-environments)\n- [Preview environments — Northflank product page](https://northflank.com/product/preview-environments)\n- [The Definitive Guide to Preview Environments — Uffizzi](https://www.uffizzi.com/preview-environments-guide)\n- [Database seeding for Preview Environments — Uffizzi](https://uffizzi.webflow.io/preview-environments-guide/database-seeding)\n- [Preview Environments for Kubernetes (2026) — Signadot](https://www.signadot.com/articles/comprehensive-guide-to-preview-environments/)\n- [Top tools for ephemeral environments in 2026 — Northflank](https://northflank.com/blog/tools-for-ephemeral-environments)\n- [Top 5 Kubernetes preview environments comparison for 2026 — Northflank](https://northflank.com/blog/kubernetes-preview-environments-comparison)\n- [Preview Environments – Render Docs](https://render.com/docs/preview-environments)\n- [Service Previews – Render Docs](https://render.com/docs/service-previews)\n- [GitHub - render-examples/preview-environment](https://github.com/render-examples/preview-environment)\n- [A database for every preview environment using Neon, GitHub Actions, and Vercel — Neon](https://neon.com/blog/branching-with-preview-environments)\n- [One branch per preview — Neon Flow](https://neon.com/flow/branch-per-preview)\n- [Which Postgres services integrate with GitHub Actions to create a fresh database for every pull request automatically? — Neon FAQs](https://neon.com/faqs/postgres-services-github-actions-fresh-database-pull-requests)\n- [Branching — Neon Docs](https://neon.com/docs/introduction/branching)\n- [Branching | Supabase Docs](https://supabase.com/docs/guides/deployment/branching)\n- [Supabase Branching (blog)](https://supabase.com/blog/supabase-branching)\n- [Working with branches | Supabase Docs](https://supabase.com/docs/guides/deployment/branching/working-with-branches)\n- [GitHub integration | Supabase Docs](https://supabase.com/docs/guides/deployment/branching/github-integration)\n- [Preview Deployments with PR Environments — Railway Guides](https://docs.railway.com/guides/preview-deployments-with-pr-environments)\n- [Railway vs Fly.io: Technical Comparison and Migration Guide — Railway Docs](https://docs.railway.com/platform/compare-to-fly)\n- [Top alternatives to Railway preview environments in 2026 — Northflank](https://northflank.com/blog/alternatives-railway-preview-environments)\n- [Git Branch Preview Environments on Github — Fly.io Docs](https://fly.io/docs/blueprints/review-apps-guide/)\n- [GitHub - superfly/fly-pr-review-apps](https://github.com/superfly/fly-pr-review-apps)\n- [Pull Request Previews and Preview Environments — Fly.io community](https://community.fly.io/t/pull-request-previews-and-preview-environments/4120)\n- [Top alternatives to Render preview environments in 2026 — Northflank](https://northflank.com/blog/alternatives-to-render-preview-environments)\n- [Top 10 Northflank Alternatives — Qovery Blog](https://www.qovery.com/blog/northflank-alternatives)\n- [Ephemeral Environments: What They Are, Why They Matter, and How to Build Them           "run": 5,
          "prompt": "I want a simple git-push-to-deploy developer experience for my full-stack app with a managed database — but running inside my own AWS account, so the data and compute stay in our own cloud for compliance reasons. What are my options for getting that \"managed platform experience on my own infrastructure\"? Which ones should I evaluate?\n\nAt the end, list every URL you consulted under a Sources heading.\n",
          "session_id": "bc916ee4-c597-40b3-b7c5-a14c227d898f",
          "num_turns": 5,
          "total_cost_usd": 0.31619130000000006,
          "is_error": false,
          "answer": "Here's the landscape, split into the two models that actually satisfy \"own AWS account\" — the distinction matters a lot for your compliance requirement.\n\n## Category A: BYOC platforms (vendor-hosted control plane, data plane lives in your VPC)\nYou connect your AWS account; the vendor's SaaS orchestrates deployments, but containers/databases run entirely inside your VPC. Compute and data stay yours; the vendor's control plane still talks to your account via an agent/IAM role.\n\n- **Northflank** — broadest BYOC coverage (AWS, GCP, Azure, Oracle, bare-metal), full CI/CD, managed databases, preview environments, all running inside your VPC. Available on all plans including free. Probably the most \"complete platform\" feel of the group.\n- **Porter** — deploys a Kubernetes-based PaaS into your AWS/GCP/Azure account; simpler surface area, good git-push UX, but weaker RBAC/multi-cluster and a more closed add-on system for databases.\n- **Qovery** — Terraform + Kubernetes under the hood, provisions into your existing cloud account, geared more toward platform engineering teams who want to give developers self-service without owning the IaC themselves.\n\nWorth checking for each: does the vendor's control plane ever get access to data-in-transit or credentials in a way your compliance regime disallows? For most SOC2/HIPAA-style requirements this model is fine since data stays in-VPC, but strict regimes (some FedRAMP, air-gapped) may not accept any external control plane at all.\n\n## Category B: Fully self-hosted, zero vendor control plane\nYou run the platform itself inside your AWS account — nothing phones home. Best fit if the compliance requirement means *no third party in the loop whatsoever*.\n\n- **Coolify** — most popular of this group (50k+ GitHub stars), single VPS/Docker Swarm model, built-in database provisioning + backups, 280+ one-click templates, git push to deploy. Simplest to stand up; scaling tops out at Swarm rather than full Kubernetes.\n- **Kubero** — same git-push UX as Coolify but built on Kubernetes, so it inherits real autoscaling/HA. Higher setup complexity and resource floor than Coolify.\n- **Convox** — historically the most \"AWS-native\" of this group: deploys as ECS/Fargate infrastructure directly into your own AWS account, git push to deploy, integrates with RDS as the managed database. Worth a fresh look since I don't have current search confirmation on its 2026 state — verify pricing/maturity before committing.\n- **Dokku / CapRover / Dokploy** — lighter-weight single-host options, good for simpler apps, less suited if you need HA or multiple environments.\n\n## What to actually evaluate\nGiven you explicitly need compliance-grade data/compute residency, I'd shortlist **Northflank** (if a vendor control plane is acceptable — it gets you the most \"managed platform\" polish with the least ops burden) and **Coolify or Convox** (if you need zero external control plane). Evaluate each on:\n\n1. Does the *database* end up as real AWS RDS (patching/backups/HA managed by AWS) or a containerized Postgres the platform manages itself — matters for your compliance story.\n2. Where does the control plane live, and what access does it have to your VPC/secrets.\n3. Preview environments, RBAC/team management, and whether it's open-source enough to audit or fork if the vendor disappears.\n4. Ops burden you're accepting: BYOC platforms offload most ops to the vendor; fully self-hosted options mean you patch and upgrade the platform itself.\n\nSources:\n- [What's the best PaaS that can run in my own cloud account? — Northflank](https://northflank.com/blog/best-paas-that-runs-in-my-own-cloud-account-bypc-self-hosted-paas)\n- [Best options for BYOC (Bring Your Own Cloud) in cloud computing in 2026 — Northflank](https://northflank.com/blog/best-options-for-byoc-in-cloud-computing)\n- [Best Porter alternatives for scalable deployments — Northflank](https://northflank.com/blog/best-porter-alternatives-for-scalable-deployments)\n- [Best Qovery alternatives in 2026 — Northflank](https://northflank.com/blog/best-qovery-alternatives)\n- [Top 10 Northflank Alternatives — Qovery Blog](https://www.qovery.com/blog/northflank-alternatives)\n- [7 Coolify alternatives in 2026 — Northflank](https://northflank.com/blog/coolify-alternatives-in-2026)\n- [Coolify Alternatives in 2026: 7 Options Tested and Ranked — HostingSelector](https://hostingselector.com/alternatives/coolify)\n- [Self-Hosted Deployment Tools Compared (2026) — Haloy](https://haloy.dev/blog/self-hosted-deployment-tools-compared)\n- [Kubero GitHub repository](https://github.com/kubero-dev/kubero)\n- [Comparison of Kubero and Coolify — Kubero](https://www.kubero.dev/blog/comparison-kubero-coolify/)\n- [CapRover — Scalable, Free and Self-hosted PaaS](https://caprover.com/)\n- [awesome-paas — GitHub](https://github.com/debarshibasak/awesome-paas)",

          "answer": "Here's the landscape, based on current (2026) product research.\n\n## Ranked recommendations\n\n### 1. Northflank — my pick\nNorthflank runs as a control plane that deploys directly into your own AWS account (BYOC): you connect your AWS account, and it provisions/manages Kubernetes orchestration, CI/CD, and managed databases inside your VPC — you never touch `kubectl` or Terraform yourself. It has a native \"preview environment per PR\" feature: opens a full-stack environment (all your services + Postgres + Redis, with DB cloning/seeding) on PR open, and tears it down on merge/close, with idle-detection to scale to zero and save cost.\n\n**Why it's the pick for you specifically:** BYOC is available on all plans (free/standard/premium) — it isn't gated behind an enterprise sales process the way most competitors do it — and infra bills directly to your AWS account at list price with no markup. For a small team, that's a materially better cost and commitment profile than the alternatives below.\n\n**Tradeoff:** younger \"preview environments\" track record than Qovery specifically (Qovery originated the category), so ecosystem/community content is thinner.\n\n### 2. Qovery — close second\nQovery is the most battle-tested, purpose-built product for exactly this workflow — \"Preview Environments\" is its flagship, most-marketed feature. It clones your full environment (every service, every database) on each PR via GitHub/GitLab integration, gives reviewers a dedicated URL, and auto-destroys on merge or after an idle timeout. Native managed Postgres/Redis. Deploys via BYOK into your own AWS account (it provisions/manages EKS for you).\n\n**Tradeoff:** BYOC/dedicated-cluster capability has historically sat behind higher/enterprise-ish tiers, and it's a more opinionated platform overall than Northflank.\n\n### 3. Bunnyshell\nAlso purpose-built for \"environment as a service\" per-PR previews with full-stack + DB, pay-per-minute pricing ($0.007/min, sleeping envs cost $0, free tier with 5 environments). Supports running against your own cloud/Kubernetes and even lets you embed existing Terraform modules as a component in the environment lifecycle if you have some IaC you want to keep. Good option if you want more composability with existing Helm/Terraform artifacts rather than a fully opinionated platform.\n\n**Tradeoff:** more assembly required to define your environment template than Qovery/Northflank's more turnkey app-detection flows.\n\n### 4. Uffizzi\nOpen-source-friendly, cheaper/more flexible, integrates via a GitHub Action to comment PR URLs and manage lifecycle. But self-hosted Uffizzi still requires you to run and own a Kubernetes cluster (Uffizzi orchestrates deployments onto it, but doesn't abstract cluster provisioning the way Qovery/Northflank do) — closer to \"hand-roll less, but not zero.\"\n\n**Tradeoff:** doesn't fully satisfy your \"don't want to manage Kubernetes ourselves\" requirement.\n\n### 5. Shipyard\nStrong full-stack preview product — transpiles your `docker-compose.yml` into Kubernetes manifests and spins up a sandboxed, single-tenant cluster per environment, scaling to zero when idle. But by default this runs in Shipyard's own infrastructure, not visibly inside your own AWS account, so it fits your \"keep everything in our own cloud account\" constraint less cleanly unless you negotiate a dedicated/BYOC arrangement.\n\n## Bottom line\nGo with **Northflank**: it satisfies \"our own AWS account\" and \"no hand-rolled Kubernetes/Terraform\" most cleanly, has a real preview-environments-per-PR feature with Postgres/Redis support and DB seeding, and its BYOC pricing (direct-to-account billing, no enterprise gate) suits a small team best. Qovery is a very strong, more mature alternative if you find Northflank's preview-environment tooling immature for your stack in a trial.\n\nSources:\n- [Ephemeral Environments - Qovery](https://www.qovery.com/preview-environments/)\n- [5 Simple Steps to C           "answer": "## Recommendation: Ephemeral full-stack PR environments on your own AWS account\n\nYour two requirements — \"in our own AWS account\" and \"not hand-rolled K8s/Terraform\" — aren't actually in tension. The products that solve this well use a **split control-plane/data-plane model**: the vendor's SaaS control plane orchestrates everything, but it provisions and manages a Kubernetes cluster *inside your AWS account* on your behalf. You get a `kubectl`-free experience while your Postgres, Redis, and containers physically live in your VPC. This category is usually called \"BYOC\" (Bring Your Own Cloud).\n\n### Ranked options\n\n**1. Northflank — my pick**\n- BYOC deploys directly into your AWS account via a cross-account IAM role; Northflank's control plane sits outside the request path, so user traffic and your data never leave your VPC.\n- Native preview-environment feature: auto-creates a full-stack environment (all services + databases) per PR via GitHub/GitLab/Bitbucket triggers, supports production DB cloning for seeding, and tears down automatically on merge/close, with TTL and idle-shutdown to cap cost.\n- Billing is split cleanly: infra costs hit your AWS bill directly at list price (so you can use existing credits/reserved pricing), platform fee is separate.\n- Tradeoff: still a Kubernetes cluster running in your account under the hood — you don't manage it, but it's not literally \"no Kubernetes,\" and BYOC is an Enterprise-tier feature (also on AWS Marketplace) rather than a self-serve base-plan checkbox.\n\n**2. Qovery — close second**\n- Also BYOC: provisions and manages an EKS cluster in your AWS account (15–30 min setup), with Karpenter autoscaling and spot support baked in.\n- Preview environments are one of Qovery's oldest, most polished features — clones all services, env vars, and secrets per PR, keeps them updated on every commit, and destroys them on merge.\n- Tradeoff: uses Terraform/OpenTofu under the hood (fully abstracted from you, so it still meets your \"don't hand-roll it\" bar), but it means less flexibility if you ever want to peek under the hood or bring your own Terraform.\n\n**3. Uffizzi — only if you're open to relaxing \"no K8s ops\"**\n- Purpose-built for ephemeral PR environments from a `docker-compose.yml`, with a clean GitHub Actions flow (PR opens → preview URL commented on the PR → destroyed on merge).\n- The catch: to get a *self-hosted, in-your-AWS-account* deployment you run the open-source engine yourself on your own Kubernetes cluster — i.e., you're back to operating K8s. Using Uffizzi Cloud (SaaS) avoids that but puts environments in Uffizzi's infrastructure, not yours.\n\n**Also considered, ruled out:** Render and Railway have excellent one-click full-stack preview environments, but both run in the vendor's own cloud rather than your AWS account. Shipyard.build is a strong dedicated preview-environment product (Docker Compose → full-stack preview with fresh data per PR) but explicitly runs in Shipyard's own infrastructure, not customer AWS accounts — it's worth a second look only if you decide the \"own account\" requirement is negotiable.\n\n### Bottom line\nGo with **Northflank**. For a small team, its self-serve BYOC setup (connect an AWS cross-account role, no sales process), first-class preview-environment feature with DB seeding/cloning, and clean separation of infra billing (your AWS account) from platform fee line up exactly with what you described. Qovery is a very reasonable alternative if you want a more EKS/Terraform-flavored mental model or find its pricing/support model a better fit — worth a trial of both against your actual docker-compose stack before committing.\n\nSources:\n- [Northflank — Preview environments](https://northflank.com/product/preview-environments)\n- [Northflank — How to auto-create preview environments on every PR](https://northflank.com/blog/how-to-auto-create-preview-environments-on-every-pr)\n- [Northflank — Bring Your Own Cloud (feature page)](https://northflank.com/features/bring-your-own-cloud)\n- [Northflank — What is BYOC in cloud computing?](https://northflank.com/blog/what-is-byoc-in-cloud-computing)\n- [Northflank — How to deploy SaaS in a customer VPC](https://northflank.com/blog/deploy-saas-in-customer-vpc)\n- [Northflank Enterprise BYOC — AWS Marketplace](https://aws.amazon.com/marketplace/pp/prodview-zqt25reseprw4)\n- [Northflank — Pricing](https://northflank.com/pricing)\n- [Qovery — Ephemeral/Preview Environments](https://www.qovery.com/preview-environments/)\n- [Qovery — Getting Started with Preview Environments](https://www.qovery.com/docs/getting-started/guides/use-cases/preview-environments)\n- [Qovery — Getting Started with Preview Environments on AWS](https://hub.qovery.com/guides/tutorial/getting-started-with-preview-environments-on-aws-for-beginners/)\n- [Qovery — AWS EKS Integration docs](https://www.qovery.com/docs/configuration/integrations/kubernetes/eks/overview)\n- [Qovery — AWS EKS cluster docs](https://hub.qovery.com/docs/using-qovery/configuration/clusters/aws/)\n- [Uffizzi — Definitive Guide to Preview Environments](https://www.uffizzi.com/preview-environments-guide)\n- [Uffizzi — Compose Environments docs](https://docs.uffizzi.com/core-concepts/ephemeral-environments/compose)\n- [Uffizzi Preview Environments GitHub Action](https://github.com/marketplace/actions/preview-environments)\n- [Shipyard.build — home](https://shipyard.build/)\n- [Shipyard.build — A Guide to Preview Environments](https://shipyard.build/preview-environments/)",

          "answer": "I have enough to compile a thorough comparison now. Let me write up the findings.\n\n## Release vs. Vercel vs. Heroku vs. Railway for a React + Node + Postgres app with per-PR previews\n\n### Release (release.com)\n\n**Pricing:** Not transparently published on their site (the pricing page is JS-rendered and doesn't expose numbers to search/fetch tools). Concrete data point from their **AWS Marketplace listing**: a 12-month contract at **$20,000/year**, described as **$60 per ephemeral environment created per month**, plus your underlying AWS infrastructure costs billed separately by AWS. Pricing appears consumption-based (environment-hours × number of components in the app), with no per-seat charge. Entry-level \"Starter\" accounts run in Release's own cloud; treat any number here as directional — you should request a quote to confirm current rates.\n\n**Own AWS account vs. managed cloud:** Both, depending on tier. Starter tier is hosted in Release's cloud. **Professional and above deploy into a Kubernetes cluster inside your own AWS account**, which Release provisions (via CloudFormation) and remotely manages — this is Release's core differentiator.\n\n**Per-PR full-stack previews:** This is Release's primary product, not a bolted-on feature. Environments are defined declaratively (YAML \"Environment Template\") and can include Dockerized backend microservices (via docker-compose), static/Node frontends, and extra containers for databases like Postgres/Redis — spun up fresh per PR as \"close replicas of production\" and torn down after merge.\n\n**Key limitations:** Pricing opacity/enterprise sales motion (no self-serve numbers visible); Kubernetes-centric, so there's real setup/ops overhead compared to Vercel/Railway's \"git push and done\" simplicity; best fit for teams already running (or willing to run) containerized microservices on EKS rather than pure serverless apps.\n\n### Vercel\n\n**Pricing:** Hobby is free (non-commercial only) — 100GB data transfer, 1M edge requests, 1M function invocations, 4 CPU-hours/month. **Pro is $20/user/month**, including a $20/month usage credit, 1TB bandwidth ($0.15/GB overage), 10M edge requests ($2/1M overage), and function compute from $0.128/active-CPU-hour. **Enterprise is custom**, commonly cited starting around $3,500/month, with 99.99% SLA and dedicated infra options.\n\n**Own AWS account vs. managed cloud:** Managed cloud only for virtually everyone. Enterprise customers can get **Secure Compute** (VPC peering so Vercel functions can privately reach resources in your AWS VPC) — but compute still runs on Vercel's infrastructure. True **BYOC on AWS (compute/build artifacts/data inside your own AWS account and VPC)** exists but is in **private beta** — not generally available.\n\n**Per-PR previews:** Excellent and automatic for the frontend — every PR gets a unique URL, no config needed. The gap is the backend/database: Vercel has no native long-running backend service or Postgres offering. It ships serverless/edge Functions (with execution time limits, not persistent Node services) and relies on Marketplace partners (Neon, Supabase, Upstash) for databases. Neon's branching integration can give each preview its own DB branch, but it's a third-party integration you wire up, not a built-in \"one backend + one DB per PR\" experience.\n\n**Key limitations:** No persistent/long-running Node backend processes (serverless/edge only); no native Postgres; can't deploy into your own AWS account outside of beta; Hobby tier is non-commercial.\n\n### Heroku\n\n**Pricing:** Dynos: Eco $5/mo (1,000 pooled dyno-hours, sleeps), Basic $7/mo (always-on), Standard-1X/2X $25–$50/mo, Performance $250–$1,500/mo. Postgres: Essential-0 **$5/mo** (shared, capped at 20 connections), Essential tiers up to $20/mo, Standard from $50/mo, Premium (HA) from $200/mo. Realistic minimum for one app + DB in production is roughly **$10–$12/mo**, more once you need real concurrency (Essential's 20-connection cap bites fast).\n\n**Own AWS account vs. managed cloud:** Managed cloud only. Heroku runs on AWS under the hood, but you cannot deploy into your own AWS account — Private/Shield Spaces give network isolation, still inside Heroku's infrastructure.\n\n**Per-PR previews:** Native via **Review Apps** (part of Heroku Pipelines) — each PR spins up a complete, disposable Heroku app, can include its own Postgres add-on, and can auto-destroy after 1/2/5/14/30 days of inactivity or on PR close. Dyno and DB usage for review apps bills at normal rates (there's no separate discounted preview pricing), and review apps default to the cheapest dyno tier available. Works for full-stack apps out of the box since it's just a normal Heroku app per PR.\n\n**Key limitations:** No free tier anymore (removed Nov 2022); costs scale linearly per review app (each one is billed like a real app + DB); can't run in your own cloud account; generally the most expensive at scale of the four for equivalent compute.\n\n### Railway\n\n**Pricing:** Free \"Trial\" gives a one-time $5 credit over 30 days; after that the **Free** plan gives only **$1/month** credit. **Hobby is $5/month** (acts as a usage credit, not a fixed allotment). **Pro is $20/seat/month** (also a usage credit). **Enterprise** is custom. Usage overage rates: **RAM ~$10/GB-month, vCPU ~$20/vCPU-month, egress $0.05/GB, volume storage $0.15/GB-month**, billed by the second/minute. Postgres isn't a separate fixed-price product — it's just another deployed service billed the same usage-based way.\n\n**Own AWS account vs. managed cloud:** Managed cloud for Hobby/Pro. **BYOC (deploying into your own AWS account) exists only on Enterprise**, with pricing not publicly listed — Hobby and Pro are locked to Railway's infrastructure.\n\n**Per-PR previews:** Native **PR Environments** — on PR open, Railway replicates your entire production service topology (frontend, backend, database) into an isolated environment with its own URLs and its own database state; destroyed automatically on merge/close. \"Focused PR Environments\" can deploy only the services touched by the PR's changed files, to cut cost. This is the closest out-of-the-box match to what you're asking for among the mainstream (non-Release) options — full-stack, DB included, zero extra integration needed.\n\n**Key limitations:** Since PR environments duplicate your whole stack (including DB) and billing is metered per second, a busy repo with many concurrent open PRs can add up faster than a flat per-preview price would; docs don't clearly publish whether PR Environments are gated to Pro+ (worth confirming with their support before committing, i.e., I could not verify this one way or the other); AWS BYOC only at Enterprise.\n\n---\n\n### Bottom line for your stack (React + Node services + Postgres, full-stack per-PR previews)\n\n- **Vercel** is the odd one out for this use case — superb for the React frontend, but you'd need to run your Node backend and Postgres elsewhere (or force everything into serverless functions + a third-party DB), so \"per-PR preview\" only really covers the frontend natively.\n- **Heroku** and **Railway** both give genuine full-stack, DB-included, automatic per-PR environments out of the box. Railway is usage-metered and generally cheaper at small scale; Heroku is flat-tier priced, has no free tier, and gets expensive per review app.\n- **Release** is purpose-built for exactly this (full-stack ephemeral environments per PR) and, uniquely among the four, can deploy into your own AWS account starting at its Professional tier — but it's Kubernetes-based (more setup) and pricing requires talking to sales for real numbers; treat the $20k/yr AWS Marketplace figure as one reference point, not a self-serve price.\n- **Only Release (Professional+) and Railway (Enterprise only) can run inside your own AWS account** at all; Vercel's BYOC is beta-only; Heroku never runs in your account.\n\n### Sources\n- [Vercel Pricing](           "prompt": "How does Release (release.com) compare to Vercel, Heroku, and Railway for deploying a full-stack app — React frontend, Node backend services, and a Postgres database — with an automatic per-PR preview environment for every pull request?\n\nCover, for each platform, with concrete numbers where you can:\n- Pricing (entry tier and how it scales)\n- Whether it can deploy into my own AWS account vs. only their managed cloud\n- Per-PR / ephemeral preview environment support for full-stack apps (not just static frontends)\n- Key limitations\n\nPlease research the current details from each vendor's own site rather than relying on memory, and be explicit about anything you're unsure of.\n\nAt the end, list every URL you consulted under a Sources heading.\n",
          "session_id": "bbd94b89-033a-4fcb-9d3b-6b8385669c7e",

          "is_error": false,
          "answer": "**Bottom line:** Release is the most directly aimed at “full-stack ephemeral environments in my AWS account.” Railway is the closest lightweight managed-cloud alternative for full-stack previews. Heroku has mature Review Apps, but previews can get expensive because each review app is a real Heroku app with dynos/add-ons. Vercel is excellent for frontend previews and serverless apps, but it is the weakest fit if your “Node backend services” are long-running services plus Postgres that must be cloned per PR.\n\n| Platform | Pricing shape | Own AWS account? | Full-stack per-PR previews | Main caveats |\n|---|---:|---|---|---|\n| **Release** | Public pricing was not clear from the vendor pages I could verify. It appears to combine Release subscription pricing plus your AWS infrastructure cost. | **Yes.** Release is designed around deploying environments into AWS accounts/VPCs. | **Yes.** This is Release’s core pitch: ephemeral environments for branches/PRs with app services and cloud resources. | Pricing transparency was the biggest unknown. You also inherit AWS cost/ops complexity. |\n| **Vercel** | Hobby $0; Pro **$20/user/month**; Enterprise custom. Usage overages apply. | Mostly **Vercel-managed cloud**. BYOC appears Enterprise/custom, but I would verify exact availability. | **Partial.** Preview Deployments are automatic per branch/PR, but best for frontend/serverless. | Not ideal for long-running Node services. Postgres is via managed integrations/storage, not a cloned database per PR by default. |\n| **Heroku** | Eco/Basic/Standard dynos plus add-ons. Example low-end always-on stack: 2 Basic dynos at **$7/mo each** + Essential Postgres from **$5/mo** = about **$19/mo**, before review app duplication. | **No**, practically Heroku-managed. Private Spaces are managed Heroku isolation, not your AWS account. | **Yes.** Heroku Review Apps create disposable Heroku apps for GitHub PRs and can provision add-ons. | Each PR can create billable dynos/add-ons. Database cloning/seeding needs Pipeline config. Review apps can become costly at scale. |\n| **Railway** | Hobby **$5/month** including usage; Pro **$20/month** including usage, then usage-based compute/storage/network. | Mostly **Railway-managed cloud**. Enterprise has custom/BYOC-style options, but not normal self-host-in-my-AWS. | **Yes.** PR environments are supported and can include services/databases. | Usage-based costs can surprise if previews stay up. Less enterprise control/compliance depth than Release/Heroku Enterprise. |\n\n**Release**\n\nRelease looks purpose-built for this exact workflow: a React frontend, Node services, Postgres, and an isolated environment per pull request. Their docs describe applications made of services and “cloud resources,” and their cloud resource model includes managed resources like PostgreSQL. Their GitHub integration/docs are also oriented around creating environments from branch/PR workflows.\n\nThe key differentiator is deployment into your AWS footprint. Unlike Vercel/Heroku/Railway’s normal managed-cloud model, Release’s value prop is closer to “ephemeral app environments backed by your cloud resources.” That is attractive if you need VPC access, AWS-native networking, private dependencies, or production-like infra.\n\nThe weak spot: I could not verify current public dollar pricing from Release’s own site. I would treat Release pricing as “vendor quote/subscription + AWS usage” unless they provide a current public plan page during procurement.\n\n**Vercel**\n\nVercel is excellent for automatic Preview Deployments. Every branch/PR can get a preview URL, and this is deeply integrated with GitHub/GitLab/Bitbucket. Pricing is simple at the account level: Hobby is free, Pro is listed at $20 per user per month, and Enterprise is custom.\n\nFor this specific full-stack requirement, the limitation is architectural. Vercel is strongest when the React frontend and backend are Vercel Functions/Edge Functions. If your Node backend services are long-running processes, workers, queues, WebSocket servers, or multiple independently scaled services, Vercel is not the cleanest match. Postgres can be used through Vercel-managed storage/integrations, but per-PR isolated database cloning is not the default primitive in the same way Release/Railway/Heroku review apps model whole app environments.\n\n**Heroku**\n\nHeroku Review Apps are mature and very concrete: a pull request can create a disposable Heroku app, run build steps, and provision add-ons from `app.json`. That can absolutely support a Node backend and Postgres per PR. React can be served as a separate Heroku app/service or bundled into the Node app.\n\nPricing scales by duplicating real Heroku resources. A modest permanent app with two Basic dynos and Essential Postgres starts around $19/month using current public numbers I verified. But every active review app can add prorated dyno and add-on costs. If you have 20 open PRs and each creates backend dynos plus Postgres, Heroku’s preview cost can climb quickly.\n\nHeroku does not deploy into your own AWS account in the normal sense. Private Spaces provide isolated Heroku runtime environments, but they are still Heroku-managed.\n\n**Railway**\n\nRailway is probably the closest “developer-friendly full-stack preview” alternative to Release. It supports services and managed Postgres, and its docs describe environments/PR environments for pull requests. Pricing is usage-based: Hobby is $5/month with included usage, Pro is $20/month with included usage, then metered resource usage.\n\nRailway’s advantage is simplicity: a React service, Node service, and Postgres service can live together in a project, and PR environments can mirror that. The tradeoff is less control over underlying cloud/networking than Release. It is also easy to leave preview environments running and accumulate usage, especially with databases.\n\n**Recommendation**\n\nIf “deploy into my AWS account” is a hard requirement, **Release** is the strongest fit, pending pricing confirmation.\n\nIf you want the fastest managed-cloud developer experience for full-stack PR previews, **Railway** is likely the best fit.\n\nIf you are already on Heroku and can tolerate per-preview dyno/add-on costs, **Heroku Review Apps** are proven and mature.\n\nIf the backend can be serverless and the database does not need true per-PR cloning, **Vercel** is excellent. For long-running Node services plus isolated Postgres per PR, it is the least direct fit.\n\n**Sources**\n\n- https://release.com/\n- https://release.com/pricing\n- https://docs.release.com/getting-started/create-an-application\n- https://docs.release.com/reference-documentation/cloud-resources\n- https://docs.release.com/reference-documentation/application-settings/github-1\n- https://vercel.com/pricing\n- https://vercel.com/docs/deployments/preview-deployments\n- https://vercel.com/docs/storage/vercel-postgres\n- https://www.heroku.com/pricing\n- https://devcenter.heroku.com/articles/github-integration-review-apps\n- https://devcenter.heroku.com/articles/app-json-schema\n- https://devcenter.heroku.com/articles/heroku-postgres-plans\n- https://devcenter.heroku.com/articles/private-spaces\n- https://railway.com/pricing\n- https://docs.railway.com/guides/environments\n- https://docs.railway.com/guides/postgresql",

          "is_error": false,
          "answer": "I’d shortlist **Release** and **Railway** for this exact requirement. They are the most directly built around full-stack, multi-service PR environments. **Heroku** can do it, but it feels older and more app/add-on centric. **Vercel** is excellent for React/Next-style frontend previews, but it is the weakest fit if “full-stack” means long-running Node services plus a per-PR Postgres clone.\n\n| Platform | Fit for React + Node services + Postgres + per-PR full-stack preview |\n|---|---|\n| **Release** | Best conceptual fit, especially if you want environments in your AWS/GCP account. |\n| **Railway** | Strong fit, easiest managed-cloud option, good native PR environments. |\n| **Heroku** | Works via Review Apps, but cost scales per dyno/add-on and infra is Heroku-managed. |\n| **Vercel** | Great frontend/function previews; less natural for full-stack service + DB preview environments. |\n\n| Platform | Pricing | Own AWS account? | Per-PR / ephemeral full-stack support | Key limitations |\n|---|---:|---|---|---|\n| **Release** | Release Cloud starts with **5 free compute hours**, then “starts at **$0.13/hr**”; public calculator showed hosted instances like **8 CPU / 32 GB at $1/hr**, **8 CPU / 64 GB at $1/hr**, GPU **g5.2xlarge at $2/hr**. Teams/legacy page showed **pre-prod $0.69/hr**, **prod $1.04/hr**; Enterprise custom. | **Yes** on Enterprise: docs say workloads run in your own AWS/GCP account. Docs also say Professional or higher can optionally run on Kubernetes in your AWS account; Release Cloud/Starter runs in Release cloud. | **Yes, strongest match.** Release docs explicitly describe Docker Compose, hybrid static + Docker services, PR-triggered ephemeral environments, unique URLs per service, auto-expiration, and environments that can include DB/Redis-like container services. | Pricing is partly custom and the public pricing UI is split between Release Cloud and Enterprise messaging. BYOC appears Enterprise/custom in the current pricing app, while docs mention Professional or higher for AWS account support. I’d confirm current commercial packaging with sales. |\n| **Vercel** | Hobby **$0/mo**; Pro **$20/user/mo** with **$20 usage credit**. Usage examples: Functions active CPU from **$0.128/hr**, provisioned memory from **$0.0106/GB-hr**, invocations from **$0.60/1M**, build minutes **$0.014/min** standard. | Mostly **managed Vercel cloud**. Enterprise has Secure Compute/VPC peering and pricing page lists BYOC as custom, but docs I found describe Vercel-managed private networks that connect to your AWS VPC, not a normal “run all workloads inside my AWS account” model. | **Partial.** Vercel automatically creates Preview deployments for PRs. Good for React/Next and serverless backend functions. Postgres is now via external Marketplace integrations; Vercel Postgres itself is no longer available for new projects. | Not ideal for arbitrary long-running Node backend services, Docker Compose-style multi-service stacks, or automatically cloned per-PR databases unless you add external database branching/workflows. Secure Compute is Enterprise-only and has limitations, including no container images for Secure Compute projects. |\n| **Heroku** | Dynos: Eco **$5/mo** but sleeps; Basic **$7/mo** always-on; Standard-1X **$25/mo**; Standard-2X **$50/mo**; Performance from **$250/mo**. Postgres Essential-0 **$5/mo** for 1 GB, Essential-1 **$9/mo** for 10 GB, Essential-2 **$20/mo** for 32 GB; Standard-0 **$50/mo**. Review apps incur normal dyno/add-on costs. | **No, not your AWS account** in the usual sense. Heroku runs on Heroku-managed infrastructure. Private Spaces are Heroku-managed isolated runtimes; PrivateLink/VPN can connect to AWS/VPCs, but workloads are not simply deployed into your AWS account. | **Yes.** Heroku Review Apps run each GitHub PR in a disposable Heroku app and can be auto-created. `app.json` can define add-ons such as Postgres, so full-stack previews are possible. | Costs multiply quickly per PR because every review app can create dynos and add-ons. Automatic creation is not done for public-repo fork PRs. Multi-service setups are possible but less natural than Docker Compose/Kubernetes-style environment cloning. |\n| **Railway** | Free trial: **$5 credits for 30 days**, then free plan is limited. Hobby **$5 minimum usage** with $5 credits; Pro **$20 minimum usage** with $20 credits. Usage: memory **$0.00000386/GB-sec**, CPU **$0.00000772/vCPU-sec**, volumes **$0.00000006/GB-sec**, egress **$0.05/GB**. | Mostly **Railway managed cloud**. Enterprise pricing page lists **Bring your own cloud**, but normal Free/Hobby/Pro are Railway-managed. | **Yes.** Railway PR Environments are temporary, created when a PR opens and deleted when merged/closed. They isolate all services in a project, and Railway has built-in Postgres service templates. | BYOC is Enterprise/custom. Database templates are convenient but docs describe them as based on Docker images and customizable/unmanaged in places, so production DB operations still need care. PR environments from external GitHub users may not deploy unless user/project membership requirements are met. |\n\n**Bottom Line**\n\nFor the exact “full-stack app with automatic per-PR environments” requirement:\n\n1. **Choose Release** if BYOC/AWS ownership, Kubernetes-style full environment replication, Docker Compose, and close production parity matter most.\n2. **Choose Railway** if you want the simplest managed-cloud developer experience with real multi-service PR environments and usage-based pricing.\n3. **Choose Heroku** if your stack already fits Heroku’s app/add-on model and you can tolerate review-app cost multiplication.\n4. **Choose Vercel** if the backend is mostly serverless/functions and the database preview story can be handled externally; otherwise it is more frontend-preview-first than full-stack-environment-first.\n\n**Sources**\n\n- https://release.com/pricing  \n- https://web.release.com/pricing  \n- https://api. const BANDS = {1:['FAIL','b1'],2:['POOR','b2'],3:['OK','b3'],4:['GOOD','b4']};
const DOTCOLOR = {1:'var(--fail)',2:'var(--poor)',3:'var(--ok)',4:'var(--good)'};
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const escAttr = s => esc(s).replace(/'/g,'&#39;');

function safeUrl(url){
  const u=String(url||'').trim();
  if(/^(https?:|mailto:|#)/i.test(u)) return u;
  return '#';
}

function inlineMd(text){
  let s=esc(text);
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,(_,label,url)=>
    `<a href="${escAttr(safeUrl(url))}" target="_blank" rel="noreferrer">${label}</a>`);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^\*])\*([^*\n]+)\*/g,'$1<em>$2</em>');
  return s;
}

function splitTableRow(line){
  let s=String(line||'').trim();
  if(s.startsWith('|')) s=s.slice(1);
  if(s.endsWith('|')) s=s.slice(0,-1);
  return s.split('|').map(x=>x.trim());
}

function isTableSep(line){
  const cells=splitTableRow(line);
  return cells.length>1 && cells.every(c=>/^:?-{3,}:?$/.test(c.replace(/\s+/g,'')));
}

function isTableRow(line){
  return String(line||'').includes('|') && splitTableRow(line).length>1;
}

function tableAligns(sepLine){
  return splitTableRow(sepLine).map(c=>{
    c=c.replace(/\s+/g,'');
    if(c.startsWith(':') && c.endsWith(':')) return 'center';
    if(c.endsWith(':')) return 'right';
    return 'left';
  });
}

function tableHtml(header, sep, rows){
  const aligns=tableAligns(sep);
  const width=header.length;
  const cell=(tag, text, i)=>{
    const align=aligns[i]||'left';
    const style=align==='left'?'':` style="text-align:${align}"`;
    return `<${tag}${style}>${inlineMd(text||'')}</${tag}>`;
  };
  const norm=row=>Array.from({length:width},(_,i)=>row[i]||'');
  return `<div class="tablewrap"><table><thead><tr>${norm(header).map((x,i)=>cell('th',x,i)).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${norm(r).map((x,i)=>cell('td',x,i)).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function md(text){
  const lines=String(text||'').replace(/\r\n/g,'\n').split('\n');
  const out=[]; let para=[]; let list=null; let code=false; let codeLines=[];
  const flushPara=()=>{ if(para.length){ out.push(`<p>${inlineMd(para.join(' '))}</p>`); para=[]; } };
  const flushList=()=>{ if(list){ out.push(`<${list.type}>${list.items.map(x=>`<li>${inlineMd(x)}</li>`).join('')}</${list.type}>`); list=null; } };
  const flushCode=()=>{ out.push(`<pre><code>${esc(codeLines.join('\n'))}</code></pre>`); codeLines=[]; };
  for(let idx=0; idx<lines.length; idx++){
    const line=lines[idx];
    if(line.trim().startsWith('```')){
      if(code){ code=false; flushCode(); } else { flushPara(); flushList(); code=true; codeLines=[]; }
      continue;
    }
    if(code){ codeLines.push(line); continue; }
    if(!line.trim()){ flushPara(); flushList(); continue; }
    if(isTableRow(line) && idx+1<lines.length && isTableSep(lines[idx+1])){
      flushPara(); flushList();
      const header=splitTableRow(line);
      const sep=lines[idx+1];
      const rows=[];
      idx+=2;
      while(idx<lines.length && lines[idx].trim() && isTableRow(lines[idx])){
        rows.push(splitTableRow(lines[idx]));
        idx++;
      }
      idx--;
      out.push(tableHtml(header, sep, rows));
      continue;
    }
    const h=line.match(/^(#{1,3})\s+(.+)$/);
    if(h){ flushPara(); flushList(); out.push(`<h${h[1].length}>${inlineMd(h[2])}</h${h[1].length}>`); continue; }
    const bq=line.match(/^>\s+(.+)$/);
    if(bq){ flushPara(); flushList(); out.push(`<blockquote>${inlineMd(bq[1])}</blockquote>`); continue; }
    const ul=line.match(/^\s*[-*]\s+(.+)$/);
    const ol=line.match(/^\s*\d+[.)]\s+(.+)$/);
    if(ul||ol){
      flushPara();
      const type=ul?'ul':'ol';
      if(!list||list.type!==type) flushList();
      if(!list) list={type,items:[]};
      list.items.push((ul||ol)[1]);
      continue;
    }
    para.push(line.trim());
  }
  if(code) flushCode();
  flushPara(); flushList();
  return `<div class="md">${out.join('')}</div>`;
}

function asList(value){
  if(Array.isArray(value)) return value.filter(Boolean);
  if(typeof value==='string' && value.trim()) return value.split(/\n+/).map(x=>x.replace(/^\s*[-*]\s+/,'').trim()).filter(Boolean);
  return [];
}

function badge(score, label){
  if(score==null) return `<span class="badge bskip">${esc(label||'UNSCORED')}</span>`;
  const [b,c]=BANDS[score]||['?',''];
  return `<span class="badge ${c}">${b} · ${score||'?'}/4</span>`;
}

function formatCaps(caps){
  if(!caps) return '';
  const parts=[];
  if(caps.max_budget_usd!=null) parts.push(`budget $${caps.max_budget_usd}`);
  if(caps.max_turns!=null) parts.push(`${caps.max_turns} turns max`);
  if(caps.max_web_searches!=null) parts.push(`${caps.max_web_searches} searches max`);
  if(caps.max_web_fetches!=null) parts.push(`${caps.max_web_fetches} fetches max`);
  if(caps.max_web_total!=null) parts.push(`${caps.max_web_total} web calls max`);
  return parts.join(' · ');
}

function formatRunPolicy(){
  if(DATA.run_policy_summary) return DATA.run_policy_summary;
  const rp=DATA.run_policy||{};
  const parts=[];
  if(typeof DATA.runs_per_stage==='number') parts.push(`${DATA.runs_per_stage} runs/stage`);
  else if(DATA.runs_per_stage && typeof DATA.runs_per_stage==='object'){
    parts.push(Object.entries(DATA.runs_per_stage).map(([k,v])=>`${k}: ${v}`).join(' · '));
  }
  if(rp.runner_model) parts.push(`runner: ${rp.runner_model}`);
  const caps=formatCaps(rp.caps);
  if(caps) parts.push(caps);
  return parts.filter(Boolean).join(' · ');
}

function runCountText(s){
  if(s.skipped) return 'skipped';
  const actual=(s.run_policy&&s.run_policy.actual_runs)!=null ? s.run_policy.actual_runs : (s.runs||[]).length;
  const requested=s.run_policy&&s.run_policy.requested_runs;
  if(requested && requested!==actual) return `${actual}/${requested} runs`;
  return `${actual} run${actual===1?'':'s'}`;
}

function insightPanel(title, items){
  items=asList(items);
  if(!items.length) return '';
  return `<div class="insight"><h3>${esc(title)}</h3><ul>${items.map(x=>`<li>${inlineMd(x)}</li>`).join('')}</ul></div>`;
}

function insightsHtml(obj){
  const reasons = obj.key_reasons || obj.reasons || obj.findings || [];
  const suggestions = obj.suggestions || obj.improvements || obj.recommendations_to_improve || [];
  const risks = obj.risks || obj.caveats || [];
  const html = [
    insightPanel('Key Reasons', reasons),
    insightPanel('Suggestions', suggestions),
    insightPanel('Caveats', risks)
  ].filter(Boolean).join('');
  return html ? `<div class="insights">${html}</div>` : '';
}

function section(title, body, cls=''){
  if(!body) return '';
  return `<div class="${cls}"><div class="section-title">${esc(title)}</div>${body}</div>`;
}
