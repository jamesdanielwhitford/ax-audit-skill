<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AX Audit Report</title>
<style>
  :root{
    --fail:#ef4444; --poor:#f97316; --ok:#3b82f6; --good:#22c55e;
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#2a2f3a;
    --text:#e7e9ee; --muted:#9aa3b2; --accent:#8b5cf6;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f7f9; --panel:#fff; --panel2:#f0f2f5; --border:#e2e5ea;
           --text:#1b1f27; --muted:#5b6472; }
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text)}
  a{color:var(--accent)}
  .wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px}
  header.top h1{margin:0 0 4px;font-size:26px}
  header.top .sub{color:var(--muted);font-size:14px}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;color:#fff;font-weight:700;
         font-size:12px;letter-spacing:.03em}
  .b1{background:var(--fail)} .b2{background:var(--poor)} .b3{background:var(--ok)} .b4{background:var(--good)}
  /* overview */
  .overview{background:var(--panel);border:1px solid var(--border);border-radius:14px;
            padding:22px;margin:22px 0}
  .overview .row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .bigscore{font-size:40px;font-weight:800;line-height:1}
  .overview p{color:var(--text);margin:14px 0 0}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:18px}
  .card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px}
  .card .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .card .val{font-size:22px;font-weight:800;margin:4px 0}
  .card .d{font-size:12px;color:var(--muted)}
  /* tabs */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:26px 0 0}
  .tab{padding:9px 14px;border:1px solid var(--border);background:var(--panel);border-radius:9px 9px 0 0;
       cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);display:flex;gap:8px;align-items:center}
  .tab.active{color:var(--text);background:var(--panel2);border-bottom-color:var(--panel2)}
  .tab .dot{width:9px;height:9px;border-radius:50%}
  .panelbox{background:var(--panel2);border:1px solid var(--border);border-radius:0 12px 12px 12px;padding:20px}
  .stage-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .stage-head h2{margin:0;font-size:20px}
  .intent{color:var(--muted);font-size:14px;margin:6px 0 0}
  .stage-summary{margin:14px 0 0;padding:12px 14px;background:var(--panel);border:1px solid var(--border);
                 border-radius:10px}
  .promptbox{margin-top:14px;font-size:13px;color:var(--muted)}
  .promptbox code{background:var(--panel);padding:2px 6px;border-radius:5px;color:var(--text)}
  /* run subtabs */
  .runtabs{display:flex;gap:6px;flex-wrap:wrap;margin:20px 0 0}
  .runtab{padding:6px 11px;border:1px solid var(--border);background:var(--panel);border-radius:8px;
          cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);display:flex;gap:7px;align-items:center}
  .runtab.active{color:var(--text);background:var(--bg)}
  .run{margin-top:16px}
  .run .meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .chip{font-size:12px;padding:2px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
  .chip.hit{border-color:var(--good);color:var(--good)}
  .why{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);
       border-radius:8px;padding:11px 13px;margin:10px 0}
  .why .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  details{margin:12px 0;border:1px solid var(--border);border-radius:9px;background:var(--panel)}
  details>summary{cursor:pointer;padding:10px 13px;font-weight:600;user-select:none}
  details .body{padding:0 14px 14px}
  .answer{white-space:pre-wrap;font-size:14px}
  .toolcall{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;padding:8px 10px;
            border:1px solid var(--border);border-radius:7px;margin:7px 0;overflow-x:auto}
  .toolcall.hit{border-color:var(--good);background:color-mix(in srgb,var(--good) 10%,transparent)}
  .toolcall .tname{font-weight:700;color:var(--accent)}
  .toolcall .flag{color:var(--good);font-weight:700;margin-left:8px}
  .srclist{margin:6px 0 0;padding-left:18px;font-size:13px;word-break:break-all}
  .srclist li.hit{color:var(--good);font-weight:600}
  .empty{color:var(--muted);font-style:italic}
  .hidden{display:none}
  .foot{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1 id="title">AX Audit Report</h1>
    <div class="sub" id="subtitle"></div>
  </header>

  <section class="overview" id="overview"></section>

  <div class="tabs" id="tabs"></div>
  <div class="panelbox" id="stagepanel"></div>

  <div class="foot">
    Generated by the <a href="https://github.com/jamesdanielwhitford/ax-audit-skill">AX audit skill</a>.
    Scores use the 1–4 rubric (FAIL / POOR / OK / GOOD).
  </div>
</div>

<script>
const BANDS = {1:['FAIL','b1'],2:['POOR','b2'],3:['OK','b3'],4:['GOOD','b4']};
const DOTCOLOR = {1:'var(--fail)',2:'var(--poor)',3:'var(--ok)',4:'var(--good)'};
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function badge(score){ const [b,c]=BANDS[score]||['?','']; return `<span class="badge ${c}">${b} · ${score||'?'}/4</span>`; }

let DATA=null, stageIdx=0, runIdx={};

function renderOverview(){
  const o=DATA.overall||{};
  document.getElementById('title').textContent = `AX Audit — ${DATA.company||'Report'}`;
  document.getElementById('subtitle').textContent =
    [DATA.category, DATA.mode, (DATA.runs_per_stage!=null?`${DATA.runs_per_stage} runs/stage`:''),
     DATA.generated_at].filter(Boolean).join(' · ');
  const el=document.getElementById('overview');
  el.innerHTML = `
    <div class="row">
      <div class="bigscore">${o.score!=null?o.score:'?'}<span style="font-size:20px;color:var(--muted)">/4</span></div>
      ${badge(o.score)}
      <div style="flex:1"></div>
    </div>
    <p>${esc(o.summary||'')}</p>
    <div class="cards">
      ${(DATA.stages||[]).map((s,i)=>`
        <div class="card" style="cursor:pointer" onclick="selectStage(${i})">
          <div class="lbl">${esc(s.title)}</div>
          <div class="val">${s.score!=null?s.score:'?'}<span style="font-size:13px;color:var(--muted)">/4</span></div>
          <div class="d">${badge(s.score)}</div>
        </div>`).join('')}
    </div>`;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML = (DATA.stages||[]).map((s,i)=>`
    <div class="tab ${i===stageIdx?'active':''}" onclick="selectStage(${i})">
      <span class="dot" style="background:${DOTCOLOR[s.score]||'var(--muted)'}"></span>${esc(s.title)}
    </div>`).join('');
}

function toolCallHtml(tc){
  const inp = tc.input||{};
  const detail = inp.url ? esc(inp.url) : inp.query ? '“'+esc(inp.query)+'”' : esc(JSON.stringify(inp));
  return `<div class="toolcall ${tc.hit_company_domain?'hit':''}">
    <span class="tname">${esc(tc.name)}</span> ${detail}
    ${tc.hit_company_domain?'<span class="flag">✓ company source</span>':''}</div>`;
}

function runHtml(r){
  const sources = (r.result_sources||[]);
  const hits = new Set(r.company_domain_hits||[]);
  return `<div class="run">
    <div class="meta">
      ${badge(r.score)}
      ${r.mentioned!=null?`<span class="chip">${r.mentioned?'mentioned':'not mentioned'}</span>`:''}
      ${r.recommended?`<span class="chip">rec: ${esc(r.recommended)}</span>`:''}
      ${(r.company_domain_hits||[]).length?`<span class="chip hit">✓ ${r.company_domain_hits.length} company source(s)</span>`:'<span class="chip">no company source</span>'}
      <span class="chip">${r.num_turns??'?'} turns</span>
      <span class="chip">$${(r.total_cost_usd||0).toFixed(3)}</span>
    </div>
    ${r.prompt?`<div class="promptbox" style="margin:10px 0">Prompt for this run: <code>${esc(r.prompt)}</code></div>`:''}
    <div class="why"><div class="k">Why this score</div>${esc(r.why||'—')}</div>

    <details open><summary>Agent answer</summary><div class="body"><div class="answer">${esc(r.answer||'')}</div></div></details>

    <details><summary>Tool calls (${(r.tool_calls||[]).length})</summary><div class="body">
      ${(r.tool_calls||[]).length? r.tool_calls.map(toolCallHtml).join('') : '<div class="empty">No tool calls recorded.</div>'}
    </div></details>

    <details><summary>Sources returned (${sources.length})</summary><div class="body">
      ${sources.length? `<ul class="srclist">${sources.map(u=>`<li class="${hits.has(u)?'hit':''}">${esc(u)}${hits.has(u)?' ✓':''}</li>`).join('')}</ul>`
                       : '<div class="empty">No sources captured.</div>'}
    </div></details>
  </div>`;
}

function renderStage(){
  const s=DATA.stages[stageIdx]; if(!s)return;
  if(runIdx[stageIdx]==null) runIdx[stageIdx]=0;
  const ri=runIdx[stageIdx];
  const el=document.getElementById('stagepanel');
  el.innerHTML = `
    <div class="stage-head">${badge(s.score)}<h2>${esc(s.title)}</h2></div>
    <div class="intent">${esc(s.intent||'')}</div>
    <div class="stage-summary">${esc(s.summary||'')}</div>
    ${s.prompt?`<div class="promptbox">Prompt: <code>${esc(s.prompt)}</code></div>`:''}
    <div class="runtabs">
      ${(s.runs||[]).map((r,i)=>`<div class="runtab ${i===ri?'active':''}" onclick="selectRun(${i})">
        <span class="dot" style="background:${DOTCOLOR[r.score]||'var(--muted)'}"></span>Run ${r.run??i+1}</div>`).join('')}
    </div>
    ${(s.runs||[])[ri]?runHtml(s.runs[ri]):'<div class="empty">No runs.</div>'}`;
}

window.selectStage=i=>{stageIdx=i;renderTabs();renderStage();
  document.getElementById('stagepanel').scrollIntoView({behavior:'smooth',block:'nearest'});};
window.selectRun=i=>{runIdx[stageIdx]=i;renderStage();};

function boot(data){ DATA=data; renderOverview(); renderTabs(); renderStage(); }

// Load audit.json sitting next to this file. (Also works if you inline the data
// as window.AUDIT_DATA for a fully self-contained single file.)
if(window.AUDIT_DATA){ boot(window.AUDIT_DATA); }
else {
  fetch('audit.json').then(r=>r.json()).then(boot).catch(e=>{
    document.getElementById('overview').innerHTML =
      `<p class="empty">Could not load <code>audit.json</code> next to this file (${esc(e.message)}).
       If opening via file://, run <code>python3 -m http.server</code> in this folder, or inline the data as
       <code>window.AUDIT_DATA</code>.</p>`;
  });
}
</script>
</body>
</html>
